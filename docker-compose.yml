version: '3.8'

services:
  draftlo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    container_name: draftlo-app
    networks:
      - draftlo-network

networks:
  draftlo-network:
    driver: bridge
